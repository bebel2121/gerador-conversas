<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Conversa Pro</title>

<link rel="stylesheet" href="css/style.css">

<!-- Biblioteca para baixar imagem -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="app">

  <div class="top">
    <input type="text" id="name" placeholder="Nome do contato">
    <input type="file" id="photo">
  </div>

  <div class="chat" id="capture">

    <div class="header">
      <img id="profile" src="assets/default.png">
      <span id="chatName">Contato</span>
    </div>

    <div id="messages"></div>

  </div>

  <div class="controls">
    <input type="text" id="msg" placeholder="Digite a mensagem">

    <div class="buttons">
      <button onclick="sendMsg()">Enviar</button>
      <button onclick="receiveMsg()">Receber</button>
    </div>

    <div class="buttons">
      <button onclick="download()">📥 Baixar Print</button>
      <button onclick="clearChat()">🗑 Limpar</button>
    </div>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
